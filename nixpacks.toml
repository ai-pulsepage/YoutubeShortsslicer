# Nixpacks configuration for Railway
# Installs system dependencies needed by workers

[variables]
NIXPACKS_NODE_VERSION = "22.12"

[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip", "fontconfig", "fonts-liberation", "fonts-noto-core", "wget"]

[phases.install]
cmds = [
    "npm ci",
    "pip3 install --break-system-packages yt-dlp",
    "mkdir -p /usr/share/fonts/montserrat && wget -q -O /usr/share/fonts/montserrat/Montserrat-Bold.ttf 'https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf' && wget -q -O /usr/share/fonts/montserrat/Montserrat-Regular.ttf 'https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Regular.ttf' && fc-cache -fv",
]
